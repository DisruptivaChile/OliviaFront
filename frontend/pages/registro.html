<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear cuenta - Olivia Merino</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/registro.css">
</head>
<body>

    <!-- Fondo decorativo -->
    <div class="bg-decoration">
        <div class="bg-circle bg-circle-1"></div>
        <div class="bg-circle bg-circle-2"></div>
        <div class="bg-line bg-line-1"></div>
        <div class="bg-line bg-line-2"></div>
    </div>

    <!-- Volver al inicio -->
    <a href="../../index.html" class="btn-home">
        <i class="fas fa-arrow-left"></i>
        <span>Olivia Merino</span>
    </a>

    <main class="registro-main">

        <!-- Columna izquierda — branding -->
        <div class="registro-brand">
            <div class="brand-content">
                <p class="brand-eyebrow">Bienvenid@ a</p>
                <h1 class="brand-title" data-no-translate>Olivia<br><em>Merino</em></h1>
                <p class="brand-subtitle">Crea tu cuenta y descubre nuestra colección de zapatos artesanales.</p>
                <div class="brand-divider"></div>
                <p class="brand-login-prompt" data-no-translate>
                    <span data-i18n="ya_tienes_cuenta">¿Ya tienes cuenta?</span>
                    <a href="../../index.html" data-i18n="iniciar-sesion">Inicia sesión</a>
                </p>
            </div>
        </div>

        <!-- Columna derecha — formulario -->
        <div class="registro-form-col">
            <div class="form-card">

                <div class="form-header">
                    <h2 data-i18n="crear-cuenta">Crear Cuenta</h2>
                    <p>Completa tus datos para registrarte</p>
                </div>

                <form id="registroForm" novalidate>

                    <!-- Nombre y Apellido -->
                    <div class="form-row">
                        <div class="form-group" id="grupo-nombre">
                            <label for="nombre">Nombre <span class="req">*</span></label>
                            <div class="input-wrap">
                                <i class="fas fa-user"></i>
                                <input type="text" id="nombre" placeholder="Tu nombre" autocomplete="given-name">
                            </div>
                            <span class="field-error" id="error-nombre"></span>
                        </div>
                        <div class="form-group" id="grupo-apellido">
                            <label for="apellido">Apellido <span class="req">*</span></label>
                            <div class="input-wrap">
                                <i class="fas fa-user"></i>
                                <input type="text" id="apellido" placeholder="Tu apellido" autocomplete="family-name">
                            </div>
                            <span class="field-error" id="error-apellido"></span>
                        </div>
                    </div>

                    <!-- Email -->
                    <div class="form-group" id="grupo-email">
                        <label for="email">Correo electrónico <span class="req">*</span></label>
                        <div class="input-wrap">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="email" placeholder="tu@correo.com" autocomplete="email">
                        </div>
                        <span class="field-error" id="error-email"></span>
                    </div>

                    <!-- Género -->
                    <div class="form-group" id="grupo-genero">
                        <label for="genero">Género</label>
                        <div class="input-wrap input-wrap-select">
                            <i class="fas fa-venus-mars"></i>
                            <select id="genero">
                                <option value="" data-i18n="prefiero-no-decir">Prefiero no decir</option>
                                <option value="femenino" data-i18n="mujer">Femenino</option>
                                <option value="masculino" data-i18n="hombre">Masculino</option>
                                <option value="otro" data-i18n="otro">Otro</option>
                            </select>
                            <i class="fas fa-chevron-down select-arrow"></i>
                        </div>
                    </div>

                    <!-- Contraseña -->
                    <div class="form-group" id="grupo-password">
                        <label for="password">Contraseña <span class="req">*</span></label>
                        <div class="input-wrap">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" placeholder="Mínimo 8 caracteres" autocomplete="new-password">
                            <button type="button" class="btn-toggle-pass" id="togglePass" tabindex="-1">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <div class="password-strength" id="passwordStrength">
                            <div class="strength-bars">
                                <span class="bar" id="bar1"></span>
                                <span class="bar" id="bar2"></span>
                                <span class="bar" id="bar3"></span>
                                <span class="bar" id="bar4"></span>
                            </div>
                            <span class="strength-label" id="strengthLabel"></span>
                        </div>
                        <span class="field-error" id="error-password"></span>
                    </div>

                    <!-- Confirmar contraseña -->
                    <div class="form-group" id="grupo-confirm">
                        <label for="confirmPassword">Confirmar contraseña <span class="req">*</span></label>
                        <div class="input-wrap">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="confirmPassword" placeholder="Repite tu contraseña" autocomplete="new-password">
                            <button type="button" class="btn-toggle-pass" id="toggleConfirm" tabindex="-1">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <span class="field-error" id="error-confirm"></span>
                    </div>

                    <!-- Error general -->
                    <div class="form-error-general" id="errorGeneral"></div>

                    <!-- Submit -->
                    <button type="submit" class="btn-submit" id="btnSubmit">
                        <span class="btn-text">Crear mi cuenta</span>
                        <i class="fas fa-arrow-right btn-icon"></i>
                    </button>

                    <p class="form-login-link" data-no-translate>
                        <span data-i18n="ya_tienes_cuenta">¿Ya tienes cuenta?</span>
                        <a href="../../index.html" data-i18n="iniciar-sesion">Inicia sesión</a>
                    </p>

                </form>
            </div>
        </div>

    </main>

    <script src="../scripts/registro.js"></script>
    <script src="../scripts/translations.js"></script>
</body>
</html>
