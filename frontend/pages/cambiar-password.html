<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambiar contraseña - Olivia Merino</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/cambiar-password.css">
</head>
<body>

    <main class="cp-main">

        <!-- Breadcrumb -->
        <div class="cp-breadcrumb">
            <a href="perfil.html"><i class="fas fa-user"></i> Mi perfil</a>
            <i class="fas fa-chevron-right"></i>
            <span>Cambiar contraseña</span>
        </div>

        <div class="cp-card">

            <!-- Header -->
            <div class="cp-header">
                <div class="cp-header-icon">
                    <i class="fas fa-lock"></i>
                </div>
                <div>
                    <h1>Cambiar contraseña</h1>
                    <p>Elige una contraseña segura que no uses en otros sitios.</p>
                </div>
            </div>

            <form id="cambiarPasswordForm" novalidate>

                <!-- Contraseña actual -->
                <div class="form-group" id="grupo-actual">
                    <label for="passwordActual">Contraseña actual <span class="req">*</span></label>
                    <div class="input-wrap">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="passwordActual" placeholder="Tu contraseña actual">
                        <button type="button" class="btn-toggle" id="toggleActual" tabindex="-1">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <span class="field-error" id="error-actual"></span>
                </div>

                <div class="cp-divider"></div>

                <!-- Nueva contraseña -->
                <div class="form-group" id="grupo-nueva">
                    <label for="passwordNueva">Nueva contraseña <span class="req">*</span></label>
                    <div class="input-wrap">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="passwordNueva" placeholder="Mínimo 8 caracteres">
                        <button type="button" class="btn-toggle" id="toggleNueva" tabindex="-1">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <!-- Indicador de fortaleza -->
                    <div class="strength-wrap" id="strengthWrap">
                        <div class="strength-bars">
                            <span class="bar" id="bar1"></span>
                            <span class="bar" id="bar2"></span>
                            <span class="bar" id="bar3"></span>
                            <span class="bar" id="bar4"></span>
                        </div>
                        <span class="strength-label" id="strengthLabel"></span>
                    </div>
                    <span class="field-error" id="error-nueva"></span>
                </div>

                <!-- Confirmar nueva contraseña -->
                <div class="form-group" id="grupo-confirmar">
                    <label for="passwordConfirmar">Confirmar nueva contraseña <span class="req">*</span></label>
                    <div class="input-wrap">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="passwordConfirmar" placeholder="Repite la nueva contraseña">
                        <button type="button" class="btn-toggle" id="toggleConfirmar" tabindex="-1">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <span class="field-error" id="error-confirmar"></span>
                </div>

                <!-- Requisitos -->
                <ul class="requisitos">
                    <li id="req-length"><i class="fas fa-circle"></i> Al menos 8 caracteres</li>
                    <li id="req-upper"><i class="fas fa-circle"></i> Una letra mayúscula</li>
                    <li id="req-number"><i class="fas fa-circle"></i> Un número</li>
                </ul>

                <!-- Error / éxito general -->
                <div class="form-feedback" id="formFeedback"></div>

                <!-- Acciones -->
                <div class="cp-actions">
                    <a href="perfil.html" class="btn-cancelar">Cancelar</a>
                    <button type="submit" class="btn-guardar" id="btnGuardar">
                        <i class="fas fa-save"></i> Actualizar contraseña
                    </button>
                </div>

            </form>
        </div>
    </main>

    <script src="../scripts/cambiar-password.js"></script>
</body>
</html>
