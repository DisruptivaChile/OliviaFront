<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Añadir Artículo - Olivia Merino</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/add-product.css">
</head>
<body>
    <script>
        if (!sessionStorage.getItem('adminToken')) {
            window.location.href = '../../index.html';
        }
    </script>

    <!-- Header -->
    <div class="page-header">
        <a href="admin-panel.html" class="btn-back">
            <i class="fas fa-arrow-left"></i> Volver
        </a>
        <h1><i class="fas fa-plus-circle"></i> Añadir artículo</h1>
    </div>

    <!-- Formulario -->
    <div class="form-card">
        <form id="addProductForm">

            <!-- SECCIÓN 1: INFORMACIÓN BÁSICA -->
            <div class="form-section">
                <p class="section-title">
                    <i class="fas fa-tag"></i> Información básica
                </p>
                <div class="form-grid">
                    <div class="form-group full">
                        <label for="nombre">Nombre del artículo <span class="req">*</span></label>
                        <input type="text" id="nombre" placeholder="Ej: Botín Camel" required>
                    </div>

                    <div class="form-group">
                        <label for="tipo_id">Tipo <span class="req">*</span></label>
                        <select id="tipo_id" required>
                            <option value="">Seleccionar tipo...</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="temporada_id">Temporada</label>
                        <select id="temporada_id">
                            <option value="">Sin temporada (atemporal)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="precio">Precio (CLP) <span class="req">*</span></label>
                        <input type="number" id="precio" placeholder="89990" min="0" required>
                    </div>

                    <div class="form-group">
                        <label>Visibilidad</label>
                        <div class="toggle-group">
                            <label class="toggle-label" id="labelPublicado">
                                <input type="checkbox" id="publicado">
                                <i class="fas fa-eye"></i> Publicado
                            </label>
                            <label class="toggle-label" id="labelAPedido">
                                <input type="checkbox" id="es_a_pedido">
                                <i class="fas fa-clock"></i> A pedido
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <!-- SECCIÓN 2: DESCRIPCIÓN -->
            <div class="form-section">
                <p class="section-title">
                    <i class="fas fa-align-left"></i> Descripción y materiales
                </p>
                <div class="form-grid">
                    <div class="form-group full">
                        <label for="descripcion">Descripción</label>
                        <textarea id="descripcion" placeholder="Descripción breve del producto..."></textarea>
                    </div>
                    <div class="form-group full">
                        <label for="materiales">Materiales</label>
                        <textarea id="materiales" placeholder="Exterior: Cuero natural&#10;Interior: Forro textil&#10;Suela: Goma antideslizante"></textarea>
                    </div>
                </div>
            </div>

            <!-- SECCIÓN 3: HISTORIA Y MÚSICA -->
            <div class="form-section">
                <p class="section-title">
                    <i class="fas fa-book-open"></i> Historia y música
                </p>
                <div class="form-grid">
                    <div class="form-group full">
                        <label for="historia">Historia del producto</label>
                        <textarea id="historia" style="min-height:120px;" placeholder="Cuenta la historia detrás de este zapato..."></textarea>
                    </div>
                    <div class="form-group full">
                        <label for="musica_url">URL de Spotify</label>
                        <input type="url" id="musica_url" placeholder="https://open.spotify.com/track/...">
                    </div>
                </div>
            </div>

            <!-- SECCIÓN 4: IMÁGENES -->
            <div class="form-section">
                <p class="section-title">
                    <i class="fas fa-images"></i> Imágenes (URLs de Cloudinary)
                </p>
                <div class="images-list" id="imagesList">
                    <!-- Filas de imágenes se añaden dinámicamente -->
                </div>
                <button type="button" class="btn-add-image" id="btnAddImage">
                    <i class="fas fa-plus"></i> Añadir imagen
                </button>
            </div>

            <!-- SECCIÓN 5: TALLAS Y STOCK -->
            <div class="form-section">
                <p class="section-title">
                    <i class="fas fa-ruler"></i> Tallas y stock
                </p>
                <p style="font-size:0.82rem; color:var(--text-light); margin-bottom:1rem;">
                    Deja en 0 las tallas que no apliquen. Solo se guardarán las tallas con stock mayor a 0.
                </p>
                <div class="tallas-grid" id="tallasGrid">
                    <!-- Generado dinámicamente -->
                </div>
            </div>

        </form>

        <!-- Footer con acciones -->
        <div class="form-footer">
            <span id="formStatus"></span>
            <a href="admin-panel.html" class="btn-cancel">Cancelar</a>
            <button type="submit" form="addProductForm" class="btn-submit" id="btnSubmit">
                <i class="fas fa-save"></i> Guardar artículo
            </button>
        </div>
    </div>

    <script src="../scripts/add-product.js"></script>
</body>
</html>
